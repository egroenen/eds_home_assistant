- id: '1736800000001'
  alias: Front Door TTS Person Detected
  description: ''
  triggers:
  - platform: state
    entity_id: binary_sensor.front_door_person_detected
    to: 'on'
  conditions:
  - condition: template
    value_template: >-
      {{ (as_timestamp(now()) -
          (as_timestamp(state_attr('automation.front_door_tts_person_detected', 'last_triggered')) | default(0))) > 120 }}
  variables:
    phrases: !include tts_phrases.yaml
    message: "{{ phrases | random }}"
    speaker: media_player.front_door_speaker
    day_volume: 0.8
    night_volume: 0.5
    prior_volume: "{{ state_attr(speaker, 'volume_level') | default(0.5) }}"
  actions:
  - choose:
    - conditions:
      - condition: time
        after: "21:00:00"
        before: "10:00:00"
      sequence:
      - action: media_player.volume_set
        data:
          entity_id: "{{ speaker }}"
          volume_level: "{{ night_volume }}"
      - delay: "00:00:01"
      - action: tts.speak
        target:
          entity_id: tts.piper
        data:
          media_player_entity_id: "{{ speaker }}"
          message: "{{ message }}"
          options:
            voice: en_GB-jenny_dioco-medium
      - delay: "00:00:01"
      - action: media_player.volume_set
        data:
          entity_id: "{{ speaker }}"
          volume_level: "{{ prior_volume }}"
    default:
    - action: media_player.volume_set
      data:
        entity_id: "{{ speaker }}"
        volume_level: "{{ day_volume }}"
    - delay: "00:00:01"
    - action: tts.speak
      target:
        entity_id: tts.piper
      data:
        media_player_entity_id: "{{ speaker }}"
        message: "{{ message }}"
        options:
          voice: en_GB-jenny_dioco-medium
  mode: single
