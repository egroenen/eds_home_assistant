- id: '1740000000000'
  alias: Garage lights on for person detected when dark
  description: ''
  triggers:
  - platform: state
    entity_id: binary_sensor.front_garage_bullet_person_detected
    to: 'on'
  conditions:
  - condition: state
    entity_id: binary_sensor.g6_bullet_is_dark
    state: 'on'
  actions:
  - action: light.turn_on
    target:
      entity_id: group.garage_lights
  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {% set t = now().time() %}
              {% set cutoff = today_at('22:30').time() %}
              {% if t >= cutoff %}
                {{ now().weekday() in [6, 0, 1, 2, 3] }}
              {% else %}
                {{ now().weekday() in [0, 1, 2, 3, 4] }}
              {% endif %}
        sequence:
          - delay: '00:05:00'
          - action: light.turn_off
            target:
              entity_id: group.garage_lights
      - conditions:
          - condition: template
            value_template: >-
              {% set t = now().time() %}
              {% set cutoff = today_at('23:30').time() %}
              {% if t >= cutoff %}
                {{ now().weekday() in [4, 5] }}
              {% else %}
                {{ now().weekday() in [5, 6] }}
              {% endif %}
        sequence:
          - delay: '00:05:00'
          - action: light.turn_off
            target:
              entity_id: group.garage_lights
  mode: single
