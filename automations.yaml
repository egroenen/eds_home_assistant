- id: '1747000000000'
  alias: Kitchen fridge door open TTS
  description: ''
  triggers:
  - platform: state
    entity_id: binary_sensor.kitchen_refrigerator_door
    to: 'on'
    for: "00:00:45"
  conditions: []
  variables:
    door_entity: binary_sensor.kitchen_refrigerator_door
    speaker: media_player.q_series_soundbar
  actions:
  - repeat:
      while:
      - condition: template
        value_template: "{{ is_state(door_entity, 'on') }}"
      sequence:
      - variables:
          prior_volume: "{{ state_attr(speaker, 'volume_level') | default(0.5) }}"
          tts_volume: "{{ (prior_volume | float(0.5) * 0.5) | round(2) }}"
          open_seconds: >-
            {{ (as_timestamp(now()) - as_timestamp(states[door_entity].last_changed
            or now())) | int(0) }}
      - action: media_player.volume_set
        data:
          entity_id: "{{ speaker }}"
          volume_level: "{{ tts_volume }}"
      - delay: "00:00:01"
      - action: tts.speak
        target:
          entity_id: tts.piper
        data:
          media_player_entity_id: "{{ speaker }}"
          message: >-
            The Kitchen Fridge Door has been left open for
            {{ open_seconds }} seconds
          options:
            voice: en_GB-jenny_dioco-medium
      - delay: "00:00:01"
      - action: media_player.volume_set
        data:
          entity_id: "{{ speaker }}"
          volume_level: "{{ prior_volume }}"
      - delay: "00:00:30"
  mode: restart
